#   hours       horas planejadas
#   deadline    prazo no formato YYYY-MM-DD
#   tags        lista de nomes de tags ou IDs
#   assignees   lista de logins, nomes ou IDs de usuarios
#   description lista de itens que viram <ul><li>...</li></ul>

