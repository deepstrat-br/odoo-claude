# Configuracao do cliente: Deepstrat
#
# CREDENCIAIS: Deixe em branco aqui e use variaveis de ambiente,
# ou preencha apenas em ambientes seguros (nunca commitar com key preenchida).
#
# Variaveis de ambiente usadas como fallback:
#   ODOO_URL, ODOO_DB, ODOO_LOGIN, ODOO_KEY

slug: deepstrat
nome: Deepstrat
moeda: BRL

contexto:
  descricao: "Consultoria especializada em implementacao e suporte de ERP Odoo no Brasil"
  segmento: "Tecnologia / Consultoria"
  modulos_ativos:
    - Projetos
    - Timesheets
    - CRM
    - Faturamento
    - Compras
    - WhatsApp

odoo:
  url: https://deepstrat.odoo.com
  db: deepstrat

# IDs de tipos de atividade (variam por instancia Odoo)
# Para descobrir os seus: python odoo.py busca mail.activity.type "id,name"
activity_types:
  call: 2          # "Ligacao / Call"
  todo: 4          # "To Do / Pendencia"

# Integracao WhatsApp
whatsapp:
  # ID do template de abordagem de leads (null = desabilita envio automatico)
  template_abordagem_leads: 17

# Configuracoes de CRM
crm:
  stage_novos: "Novos"   # Nome exato da etapa de leads novos nao qualificados
  metodologia: |
    METODOLOGIA DE QUALIFICACAO:
    1. Para cada lead, pesquise a empresa online (Google, Instagram, site, CNPJ).
    2. Analise sinais: site proprio (+), email corporativo (+), presenca digital (+), email .edu.br (-), nome sem sentido (-), telefone incompleto (-).
    3. Classifique: 3=empresa real confirmada com necessidade ERP, 2=provavelmente real mas sem confirmacao, 1=pouca info/micro, 0=spam/bot/academico.
    4. Atualize: capitalizar nomes, preencher empresa, adicionar pesquisa na descricao, definir prioridade, adicionar website se encontrado.
    5. Para leads prioridade 3: enviar WhatsApp de abordagem (auto) + criar atividade Call.
       Para leads prioridade 2: criar atividade de revisao manual (To Do).
    6. Titulo padrao: 'Lead Odoo: Nome do Contato — Empresa'.
    Detalhes completos: docs/qualificacao-leads.md
