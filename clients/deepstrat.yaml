    - Nicholas
    - Thiago
    - Stefano
    - Vagner
  "Terceiriza\u00e7\u00e3o / Subcontrata\u00e7\u00e3o":
    - Terceiriza
    - Subcontrat
    - Imaginera
  "Projetos Especiais":
    - Projeto Especial
    - Expo Sebrae
    - Rebranding
  "Software / SaaS / Infraestrutura":
    - Software
    - SaaS
    - Assinatura
    - Infraestrutura
    - DevOps
    - Anthropic
    - OpenRouter
    - Claude
    - Hostinger
    - Perplexity
    - AWS
    - Google Workspace
  "Marketing / Publicidade":
    - Marketing
    - Google Ads
    - Ads
    - Publicidade
    - Propaganda
    - Eventos
    - Fotografia
    - Materiais Promocionais
    - Ag\u00eancia
  "Impostos e Taxas":
